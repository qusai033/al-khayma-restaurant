<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al Khayma Restaurant</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#f5f5f5;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
background:#222;
padding:15px 40px;
}

.logo{
color:white;
font-size:24px;
font-weight:bold;
}

.nav-links{
list-style:none;
display:flex;
gap:20px;
}

.nav-links a{
color:white;
text-decoration:none;
font-size:18px;
}

.nav-links a:hover{
color:orange;
}

.hero{
text-align:center;
padding:100px 20px;
background:#eee;
}

.btn{
background:orange;
color:white;
padding:12px 25px;
border-radius:5px;
text-decoration:none;
}

.menu{
padding:40px;
text-align:center;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
margin-top:30px;
}

.menu-item{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.menu-item img{
width:100%;
border-radius:10px;
}

.cart{
padding:40px;
text-align:center;
}

.cart ul{
list-style:none;
padding:0;
}

.cart li{
padding:10px;
border-bottom:1px solid #ccc;
}

button{
background:orange;
border:none;
padding:10px 15px;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#e68900;
}

</style>
</head>

<body>

<header>
<nav class="navbar">

<div class="logo">Al Khayma</div>

<ul class="nav-links">
<li><a href="#home">Home</a></li>
<li><a href="#menu">Menu</a></li>
<li><a href="#cart">Cart (<span id="cart-count">0</span>)</a></li>
</ul>

</nav>
</header>

<section id="home" class="hero">
<h1>Welcome to Al Khayma</h1>
<p>Authentic Middle Eastern Food</p>
<a href="#menu" class="btn">View Menu</a>
</section>

<section id="menu" class="menu">

<h1>Our Menu</h1>

<div class="menu-grid">

<div class="menu-item">
<img src="https://via.placeholder.com/300">
<h3>Chicken Shawarma</h3>
<p>$10</p>
<button onclick="addToCart('Chicken Shawarma',10)">Add to Cart</button>
</div>

<div class="menu-item">
<img src="https://via.placeholder.com/300">
<h3>Lamb Kabab</h3>
<p>$12</p>
<button onclick="addToCart('Lamb Kabab',12)">Add to Cart</button>
</div>

<div class="menu-item">
<img src="https://via.placeholder.com/300">
<h3>Falafel Plate</h3>
<p>$8</p>
<button onclick="addToCart('Falafel Plate',8)">Add to Cart</button>
</div>

</div>

</section>

<section id="cart" class="cart">

<h1>Your Cart</h1>

<ul id="cart-items"></ul>

<h2>Total: $<span id="total">0</span></h2>

</section>

<script>

let cart=[]
let total=0

function addToCart(name,price){

cart.push({name,price})
total+=price

updateCart()

}

function updateCart(){

const cartList=document.getElementById("cart-items")
const cartCount=document.getElementById("cart-count")
const totalDisplay=document.getElementById("total")

cartList.innerHTML=""

cart.forEach(item=>{
let li=document.createElement("li")
li.textContent=item.name+" - $"+item.price
cartList.appendChild(li)
})

cartCount.textContent=cart.length
totalDisplay.textContent=total

}

</script>

</body>
</html>
